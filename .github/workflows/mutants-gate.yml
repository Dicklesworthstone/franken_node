name: Cargo Mutants Gate

on:
  pull_request:
    paths:
      - '.cargo-mutants.toml'
      - '.github/workflows/mutants-gate.yml'
      - 'crates/franken-node/src/security/constant_time.rs'
      - 'crates/franken-node/src/observability/evidence_ledger.rs'
      - 'crates/franken-node/src/connector/canonical_serializer.rs'
      - 'crates/franken-node/src/encoding/canonical_serializer.rs'
      - 'crates/franken-node/src/observability/evidence_ledger_conformance_tests.rs'
      - 'crates/franken-node/tests/canonical_serializer_conformance.rs'
      - 'crates/franken-node/tests/canonical_serializer_metamorphic.rs'
      - 'crates/franken-node/tests/canonical_serializer_real_inputs.rs'
      - 'crates/franken-node/tests/evidence_ledger_chain_order_metamorphic.rs'
      - 'crates/franken-node/tests/observability_evidence_ledger_regressions.rs'
      - 'fuzz/fuzz_targets/fuzz_canonical_serializer_deserialize.rs'
      - 'fuzz/fuzz_targets/fuzz_canonical_serializer_roundtrip.rs'
      - 'fuzz/fuzz_targets/fuzz_constant_time_comparison.rs'
      - 'fuzz/fuzz_targets/fuzz_evidence_ledger_entry_parse.rs'
      - 'fuzz/fuzz_targets/fuzz_evidence_ledger_jsonl_spill.rs'

jobs:
  cargo-mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: franken_node
    steps:
      - name: Check out franken_node
        uses: actions/checkout@v4
        with:
          path: franken_node

      - name: Check out franken_engine sibling
        uses: actions/checkout@v4
        with:
          repository: Dicklesworthstone/franken_engine
          path: franken_engine

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo home and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-mutants
          key: ${{ hashFiles('franken_node/Cargo.lock', 'franken_node/.cargo-mutants.toml') }}
          workspaces: |
            franken_node -> target
          cache-all-crates: "true"

      - name: Install rch
        run: |
          curl -fsSL https://raw.githubusercontent.com/Dicklesworthstone/remote_compilation_helper/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.0.0 --locked

      - name: Run cargo-mutants
        id: mutants
        env:
          RCH_VISIBILITY: summary
        run: |
          set +e
          "$HOME/.local/bin/rch" exec -- cargo mutants \
            --config .cargo-mutants.toml \
            --package frankenengine-node \
            --test-package frankenengine-node \
            --cargo-test-arg=--lib \
            --cargo-test-arg=--tests \
            --in-place=false \
            --no-shuffle \
            --timeout 60 \
            --output mutants-output
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload cargo-mutants output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-mutants-output
          path: franken_node/mutants-output
          if-no-files-found: warn
          retention-days: 7

      - name: Summarize cargo-mutants results
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          outcomes_path = pathlib.Path("mutants-output/outcomes.json")
          if not outcomes_path.exists():
              print("mutants-output/outcomes.json was not produced")
          else:
              outcomes = json.loads(outcomes_path.read_text())
              print(json.dumps(outcomes.get("summary", {}), indent=2, sort_keys=True))
          PY

      - name: Enforce cargo-mutants exit code
        if: always()
        env:
          EXIT_CODE: ${{ steps.mutants.outputs.exit_code }}
        run: |
          code="${EXIT_CODE:-1}"
          if [[ "$code" -ne 0 ]]; then
            echo "cargo-mutants failed with exit code $code"
            exit "$code"
          fi

      # bd-5r99w.14: back the README "tests" claim with effective coverage —
      # a mutation-adequacy floor, not a raw count. Computes the catch ratio over
      # viable mutants and fails when it drops below a registered floor, so a
      # regression that guts the focused suites' detection power is caught.
      - name: Enforce mutation-adequacy floor (bd-5r99w.14)
        if: always()
        env:
          # Conservative provisional floor in basis points. The gate scopes to
          # heavily tested files (constant_time, evidence_ledger,
          # canonical_serializer); ratchet this up once a measured baseline is
          # recorded. This is the registered floor the effective-coverage claim
          # references.
          MUTATION_SCORE_FLOOR_BP: "2500"
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          floor_bp = int(os.environ.get("MUTATION_SCORE_FLOOR_BP", "2500"))
          path = pathlib.Path("mutants-output/outcomes.json")
          if not path.exists():
              print("mutation-adequacy: outcomes.json absent; skipping floor "
                    "(exit-code gate already enforced)")
              sys.exit(0)
          try:
              data = json.loads(path.read_text())
          except (OSError, json.JSONDecodeError) as exc:
              print(f"mutation-adequacy: could not read outcomes.json ({exc}); skipping floor")
              sys.exit(0)

          outcomes = data.get("outcomes", data if isinstance(data, list) else [])
          caught = missed = timeout = unviable = other = 0
          for outcome in outcomes:
              summary = outcome.get("summary") if isinstance(outcome, dict) else None
              token = (summary if isinstance(summary, str) else json.dumps(summary)).lower()
              if "caught" in token:
                  caught += 1
              elif "missed" in token:
                  missed += 1
              elif "timeout" in token:
                  timeout += 1
              elif "unviable" in token:
                  unviable += 1
              else:
                  other += 1

          viable = caught + missed + timeout
          if viable == 0:
              print(f"mutation-adequacy: no viable mutants parsed "
                    f"(caught={caught} missed={missed} timeout={timeout} "
                    f"unviable={unviable} other={other}); skipping floor")
              sys.exit(0)

          # A timeout is a detection: the mutant made the suite hang/fail.
          score_bp = round((caught + timeout) * 10000 / viable)
          print(f"mutation-adequacy: caught={caught} missed={missed} timeout={timeout} "
                f"unviable={unviable} viable={viable} score={score_bp}bp floor={floor_bp}bp")
          if score_bp < floor_bp:
              print(f"::error::mutation score {score_bp}bp is below the registered floor "
                    f"{floor_bp}bp (bd-5r99w.14)")
              sys.exit(1)
          print("mutation-adequacy: floor satisfied")
          PY
