name: dist

# Release pipeline for the `franken-node` binary.
#
# Produces the canonical fleet artifacts consumed by install.sh and by dsr:
#   franken-node-<target-triple>.tar.xz
#   franken-node-<target-triple>.tar.xz.sha256        (shasum -a 256 format)
#   franken-node-<target-triple>.tar.xz.sigstore.json (cosign, keyless)
#
# franken-node's default `engine` feature depends on franken_engine via a
# relative path (../../../franken_engine/crates/franken-engine), so the build
# checks out franken_engine as a sibling of franken_node. Linux ships gnu
# (the engine links C deps; musl static is intentionally avoided).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout franken_node
        uses: actions/checkout@v6
        with:
          path: franken_node

      - name: Checkout franken_engine (sibling dependency)
        uses: actions/checkout@v6
        with:
          repository: Dicklesworthstone/franken_engine
          ref: main
          path: franken_engine

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build franken-node
        working-directory: franken_node
        env:
          RCH_CARGO_WRAPPER_BYPASS: "1"
        run: cargo build --release -p frankenengine-node --bin franken-node --target ${{ matrix.target }}

      - name: Create tarball
        working-directory: franken_node
        run: |
          set -euo pipefail
          mkdir -p dist
          TARBALL="franken-node-${{ matrix.target }}.tar.xz"
          binary="target/${{ matrix.target }}/release/franken-node"
          [ -f "$binary" ] || { echo "::error::expected binary not found at $binary"; exit 1; }
          tar -cJf "dist/$TARBALL" -C "target/${{ matrix.target }}/release" franken-node
          (cd dist && shasum -a 256 "$TARBALL" > "$TARBALL.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: franken_node/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -laR dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release artifacts (sigstore bundle)
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          for f in franken-node-*.tar.xz; do
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done

      - name: Copy + checksum install scripts
        run: |
          set -euo pipefail
          for script in install.sh install.ps1; do
            cp "$script" dist/ 2>/dev/null || echo "no $script"
            if [ -f "dist/$script" ]; then
              (cd dist && shasum -a 256 "$script" > "$script.sha256")
              cosign sign-blob --yes --bundle "dist/$script.sigstore.json" "dist/$script"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
