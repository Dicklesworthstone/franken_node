name: Inline Library Tests Gate

on:
  pull_request:
    paths:
      - "crates/franken-node/Cargo.toml"
      - "crates/franken-node/src/**"
      - ".github/workflows/inline-lib-tests-gate.yml"

jobs:
  inline-lib-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
        working-directory: franken_node
    steps:
      - name: Check out franken_node
        uses: actions/checkout@v4
        with:
          path: franken_node

      - name: Check out franken_engine sibling
        uses: actions/checkout@v4
        with:
          repository: Dicklesworthstone/franken_engine
          path: franken_engine

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo home and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: inline-lib-tests
          key: ${{ hashFiles('franken_node/Cargo.lock', 'franken_node/crates/franken-node/Cargo.toml') }}
          workspaces: |
            franken_node -> target
          cache-all-crates: "true"

      - name: Install rch
        run: |
          curl -fsSL https://raw.githubusercontent.com/Dicklesworthstone/remote_compilation_helper/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Assert inline library tests are discoverable
        run: |
          set -euo pipefail
          "$HOME/.local/bin/rch" exec -- env CARGO_INCREMENTAL=0 cargo test \
            -p frankenengine-node \
            --lib \
            --features extended-surfaces,test-support \
            -- --list \
            | tee inline-lib-tests.list
          test_count="$(grep -Ec '^[^[:space:]].*: test$' inline-lib-tests.list || true)"
          echo "Discovered ${test_count} inline library tests"
          if [[ "${test_count}" -le 0 ]]; then
            echo "Expected cargo test --lib to discover at least one inline library test"
            exit 1
          fi

      - name: Run inline library tests
        run: |
          "$HOME/.local/bin/rch" exec -- env CARGO_INCREMENTAL=0 cargo test \
            -p frankenengine-node \
            --lib \
            --features extended-surfaces,test-support
