name: Inline Library Tests Gate

on:
  pull_request:
    paths:
      - "crates/franken-node/Cargo.toml"
      - "crates/franken-node/src/**"
      - "scripts/check_inline_lib_tests.py"
      - "tests/test_check_inline_lib_tests.py"
      - ".github/workflows/inline-lib-tests-gate.yml"
  workflow_dispatch:
    inputs:
      run_full_inline_tests:
        description: "Run the expensive dedicated cargo test --lib lane"
        required: false
        default: false
        type: boolean

jobs:
  inline-lib-test-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
        working-directory: franken_node
    steps:
      - name: Check out franken_node
        uses: actions/checkout@v4
        with:
          path: franken_node

      - name: Check out franken_engine sibling
        uses: actions/checkout@v4
        with:
          repository: Dicklesworthstone/franken_engine
          path: franken_engine

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Gate parser unit tests
        run: python3 tests/test_check_inline_lib_tests.py

      - name: Assert inline library test override wiring
        run: python3 scripts/check_inline_lib_tests.py --preflight --json

  full-inline-lib-tests:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_full_inline_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: inline-lib-test-preflight
    defaults:
      run:
        shell: bash
        working-directory: franken_node
    steps:
      - name: Check out franken_node
        uses: actions/checkout@v4
        with:
          path: franken_node

      - name: Check out franken_engine sibling
        uses: actions/checkout@v4
        with:
          repository: Dicklesworthstone/franken_engine
          path: franken_engine

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo home and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: inline-lib-tests
          key: ${{ hashFiles('franken_node/Cargo.lock', 'franken_node/crates/franken-node/Cargo.toml') }}
          workspaces: |
            franken_node -> target
          cache-all-crates: "true"

      - name: Install rch
        run: |
          curl -fsSL https://raw.githubusercontent.com/Dicklesworthstone/remote_compilation_helper/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Assert inline library tests are discoverable
        run: |
          set -euo pipefail
          "$HOME/.local/bin/rch" exec -- env CARGO_INCREMENTAL=0 RUSTFLAGS="--cfg franken_node_inline_tests" cargo test \
            -p frankenengine-node \
            --lib \
            --features extended-surfaces,test-support \
            -- --list \
            | tee inline-lib-tests.list
          python3 scripts/check_inline_lib_tests.py inline-lib-tests.list --min-tests 1 --json

      - name: Emit inline library test shard plan
        run: |
          python3 scripts/check_inline_lib_tests.py inline-lib-tests.list \
            --emit-shard-plan \
            --max-tests-per-shard 500 \
            --shard-timeout-seconds 1800 \
            --rch-bin "$HOME/.local/bin/rch" \
            --plan-jsonl-out inline-lib-tests.plan.jsonl \
            --json \
            > inline-lib-tests.plan.json

      - name: Run inline library tests in resumable shards
        run: |
          python3 scripts/check_inline_lib_tests.py inline-lib-tests.list \
            --run-shards \
            --resume \
            --fail-fast \
            --max-tests-per-shard 500 \
            --shard-timeout-seconds 1800 \
            --rch-bin "$HOME/.local/bin/rch" \
            --receipt-jsonl inline-lib-tests.receipts.jsonl \
            --output-dir inline-lib-test-shards

      - name: Upload inline library shard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inline-lib-test-shard-evidence
          path: |
            franken_node/inline-lib-tests.list
            franken_node/inline-lib-tests.plan.json
            franken_node/inline-lib-tests.plan.jsonl
            franken_node/inline-lib-tests.receipts.jsonl
            franken_node/inline-lib-test-shards/
