name = "test-engine"
path = "src/bin/test_engine.rs"
test = false
required-features = ["test-support"]

[[bin]]
name = "bd-21fo-governor-conformance"
path = "src/bin/bd_21fo_governor_conformance.rs"
test = false
required-features = ["advanced-features"]

