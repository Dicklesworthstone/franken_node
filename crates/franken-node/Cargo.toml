name = "bd-137-policy-compatibility-gate-conformance"
path = "src/bin/bd_137_policy_compatibility_gate_conformance.rs"
test = false
required-features = ["advanced-features"]

[[bin]]
name = "collect-production-metrics"
path = "src/bin/collect_production_metrics.rs"
test = false

[[bin]]
name = "vef-degraded-mode-metamorphic"
path = "tests/vef_degraded_mode_metamorphic.rs"
test = false

[lib]
path = "src/lib.rs"
test = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)', 'cfg(franken_node_inline_tests)'] }

[features]
asupersync-transport = ["dep:asupersync"]

# Legacy feature for backward compatibility - includes all new features
extended-surfaces = [
    "control-plane",
    "policy-engine",
    "remote-ops",
    "admin-tools",
    "verifier-tools",
    "advanced-features"
]

# Granular feature split
control-plane = ["policy-engine"]      # API middleware, fleet operations, control plane functionality
policy-engine = []      # Security policies, guardrail monitors, hardening state machines
remote-ops = []         # Remote operations, distributed coordination, eviction sagas
admin-tools = []        # Enterprise governance, migration tools, administrative functionality
verifier-tools = ["control-plane"]     # Verifier-specific tooling, economy, SDK
advanced-features = ["verifier-tools"]  # Claims, conformance, encoding, extensions, federation, perf, repair

test-support = ["control-plane", "admin-tools"]
# Compile library-level `#[cfg(loom)]` model helpers for explicit loom test
# invocations. This is intentionally not part of default or test-support builds.
loom-models = ["dep:loom"]
# Heavy compilation dependencies - optional for fuzz builds
http-client = ["dep:ureq", "dep:url"]
external-commands = ["dep:which", "dep:ctrlc"]
compression = ["dep:flate2"]
cbor-serialization = ["dep:ciborium"]
engine = ["dep:frankenengine-engine", "dep:frankenengine-extension-host"]
blake3 = ["dep:blake3"]
# bd-98xo5.12.1: opt-in profiling feature pulling in the hdrhistogram
# dependency for per-hot-path latency histograms. Production builds
# (`cargo build` with default features) DO NOT compile this code path —
# the #[cfg(feature = "profiling")] gate elides it entirely. Enable
# explicitly with `cargo build --features profiling` when running
# under a perf-round measurement skill.
profiling = ["dep:hdrhistogram"]
# Default stays limited to features needed for a usable node binary.
# Heavy product surfaces and optional export formats require explicit opt-in.
default = ["engine", "http-client", "external-commands"]

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
clap = { version = "4.5.32", features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
chrono = { version = "0.4.40", features = ["serde", "clock"] }
uuid = { version = "1.16.0", features = ["v7", "serde"] }
sha2 = "0.11.0"
hmac = "0.13.0"
hkdf = "0.13.0"
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
hex = "0.4.3"
base64 = "0.22.1"
franken-security-macros = { path = "../franken-security-macros" }
ed25519-dalek = { version = "2.1.1", features = ["rand_core"] }
ciborium = { version = "0.2.2", optional = true }
flate2 = { version = "1.0.35", optional = true }
rand = "0.8.5"
asupersync = { version = "0.3.4", optional = true }
# bd-98xo5.12.1: HDR histogram for the `profiling` feature. Optional
# so default builds pay zero binary cost.
hdrhistogram = { version = "7.5", default-features = false, optional = true }
frankentui.workspace = true
fs2 = "0.4.3"
frankenengine-engine = { path = "../../../franken_engine/crates/franken-engine", optional = true }
frankenengine-extension-host = { path = "../../../franken_engine/crates/franken-extension-host", optional = true }
tracing = { workspace = true }
subtle = "2.6.1"
tempfile = "3.15"
arbitrary = { version = "1.3", features = ["derive"] }
proptest = "1.6"
# Heavy compilation dependencies made optional for faster fuzz builds
ureq = { version = "3", optional = true }
url = { version = "2.5", optional = true }
which = { version = "8.0.2", optional = true }
ctrlc = { version = "3", optional = true, features = ["termination"] }
tree-sitter = "0.26.8"
tree-sitter-javascript = "0.25.0"
blake3 = { version = "1.5", optional = true }
lazy_static = "1.5.0"
loom = { version = "0.7", optional = true }

# Windows: AF_UNIX socket support for the telemetry bridge (Unix uses std's
# os::unix::net). uds_windows mirrors std's UnixListener/UnixStream API.
[target.'cfg(windows)'.dependencies]
uds_windows = "1"

[dev-dependencies]
assert_cmd = "2.0.16"
assert2 = "0.4.0"
fsqlite = { path = "../../../frankensqlite/crates/fsqlite", default-features = false, features = ["native"] }
frankenengine-verifier-sdk = { path = "../../sdk/verifier" }
fastapi_rust = { package = "fastapi-rust", path = "/dp/fastapi_rust/crates/fastapi", default-features = false }
tokio = { workspace = true, features = ["sync", "time"] }
regex = "1.11.1"
sqlmodel = { path = "/dp/sqlmodel_rust/crates/sqlmodel", default-features = false }
sqlmodel-core = { path = "/dp/sqlmodel_rust/crates/sqlmodel-core" }
sqlmodel-schema = { path = "/dp/sqlmodel_rust/crates/sqlmodel-schema" }
syn = { version = "2.0", features = ["full"] }
tracing-subscriber = { workspace = true }
insta = { version = "1.40", features = ["json", "filters", "redactions"] }
criterion = { version = "0.5", features = ["html_reports"] }

